name: ananpath_ai
description: AI Chat application based on PDF knowledge base using Google Gemini.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_generative_ai: ^0.4.0
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.2
  file_picker: ^8.0.0
  syncfusion_flutter_pdf: ^21.1.35
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
